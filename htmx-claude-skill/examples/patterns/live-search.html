<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTMX Live Search Pattern</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    .search-container {
      margin-bottom: 2rem;
    }
    .search-input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 4px;
    }
    .search-input:focus {
      outline: none;
      border-color: #3498db;
    }
    .results {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .result-item {
      padding: 1rem;
      background: #f5f5f5;
      border-radius: 4px;
      border: 1px solid #eee;
    }
    .result-item:hover {
      background: #eee;
    }
    .no-results {
      padding: 2rem;
      text-align: center;
      color: #666;
    }
    .loading {
      padding: 1rem;
      text-align: center;
      color: #666;
    }
    .search-indicator {
      display: none;
    }
    .htmx-request .search-indicator {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Live Search Pattern</h1>
  <p>Type in the search box to see live results. Uses <code>hx-trigger="input changed delay:300ms"</code> to debounce requests.</p>
  
  <div class="search-container">
    <input type="search"
           class="search-input"
           name="q"
           placeholder="Search..."
           hx-get="/search"
           hx-trigger="input changed delay:300ms"
           hx-target="#results"
           hx-swap="innerHTML"
           hx-indicator=".search-indicator">
    <div class="search-indicator">Searching...</div>
  </div>
  
  <div id="results">
    <div class="no-results">Start typing to search...</div>
  </div>
  
  <script>
    // Server endpoint:
    // GET /search?q=query
    // Returns HTML fragment:
    // <div class="results">
    //   <div class="result-item">Result 1</div>
    //   <div class="result-item">Result 2</div>
    // </div>
    //
    // Or if no results:
    // <div class="no-results">No results found</div>
    //
    // Empty query returns empty or placeholder:
    // <div class="no-results">Start typing to search...</div>
    
    // Optional: Clear results when input is cleared
    document.querySelector('.search-input').addEventListener('input', function(e) {
      if (e.target.value.trim() === '') {
        document.getElementById('results').innerHTML = 
          '<div class="no-results">Start typing to search...</div>';
      }
    });
  </script>
</body>
</html>
